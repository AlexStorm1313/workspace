{{ if has "dbgate" .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dbgate
  labels:
    app: {{ .Release.Name }}-dbgate
spec:
  {{ if .Values.devmode }}
  strategy:
    type: Recreate
  {{ end }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-dbgate
  template:
    metadata:
      annotations:
      {{ if .Values.devmode }}
        rollme: {{ randAlphaNum 5 | quote }}
      {{ end }}
      labels:
        app: {{ .Release.Name }}-dbgate
        deployment: {{ .Release.Name }}-dbgate
    spec:
      {{ include "deployment.securityContext" . | indent 6 }}
      initContainers:
        - name: copy
          {{ if eq .Values.environment "okd" }}
          image: image-registry.openshift-image-registry.svc:5000/{{ .Release.Namespace }}/dbgate:latest
          {{ else }}
          image: docker.io/dbgate/dbgate:latest
          {{ end }}
          command: ["/bin/cp"]
          args: ["-r",
            "/home/dbgate-docker",
            "/mnt/{{ .Release.Name }}-dbgate-dbgate/dbgate-docker",
          ]
          volumeMounts:
            - name: {{ .Release.Name }}-dbgate-dbgate
              mountPath: /mnt/{{ .Release.Name }}-dbgate-dbgate
        - name: volume
          {{ if eq .Values.environment "okd" }}
          image: image-registry.openshift-image-registry.svc:5000/{{ .Release.Namespace }}/busybox:latest
          {{ else }}
          image: docker.io/busybox:latest
          {{ end }}
          command: ["/bin/mkdir"]
          args: ["-p",
            "/mnt/{{ .Release.Name }}-dbgate-dbgate/.dbgate",
          ]
          volumeMounts:
            - name: {{ .Release.Name }}-dbgate-dbgate
              mountPath: /mnt/{{ .Release.Name }}-dbgate-dbgate
      containers:
        - name: dbgate
          {{ if eq .Values.environment "okd" }}
          image: image-registry.openshift-image-registry.svc:5000/{{ .Release.Namespace }}/dbgate:latest
          {{ else }}
          image: docker.io/dbgate/dbgate:latest
          {{ end }}
          imagePullPolicy: {{ .Values.deployments.containers.pullPolicy }}
          volumeMounts:
            - name: {{ .Release.Name }}-dbgate-dbgate
              mountPath: /home/dbgate-docker
              subPath: dbgate-docker
            - name: {{ .Release.Name }}-dbgate-dbgate
              mountPath: /.dbgate
              subPath: .dbgate
          # Example configuration for adding database sources
          # env:
          #   - name: CONNECTIONS
          #     value: database,cache

          #   - name: LABEL_database
          #     value: example-database
          #   - name: SERVER_database
          #     value: example-database-pod
          #   - name: PORT_database
          #     value: 5432
          #   - name: USER_database
          #     value: example
          #   - name: PASSWORD_database
          #     value: example
          #   - name: DATABASE_database
          #     value: example
          #   - name: ENGINE_database
          #     value: postgres@dbgate-plugin-postgres

          #   - name: LABEL_cache
          #     value: example-cache
          #   - name: SERVER_cache
          #     value: example-cache-pod
          #   - name: ENGINE_cache
          #     value: redis@dbgate-plugin-redis
          livenessProbe:
            httpGet:
              path: /
              port: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
      volumes:       
        - name: {{ .Release.Name }}-dbgate-dbgate
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-dbgate-dbgate
{{ end }}