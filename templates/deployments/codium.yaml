{{ if has "codium" .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-codium
  labels:
    app: {{ .Release.Name }}-codium
spec:
  {{ if .Values.devmode }}
  strategy:
    type: Recreate
  {{ end }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-codium
  template:
    metadata:
      annotations:
      labels:
        app: {{ .Release.Name }}-codium
        deployment: {{ .Release.Name }}-codium
    spec:
      {{ include "pod.securityContext" . | indent 6 }}
      initContainers:
        - name: volumes
          {{ include "container.securityContext" . | indent 10 }}
          image: ghcr.io/alexstorm1313/codium:latest
          imagePullPolicy: {{ .Values.deployments.containers.pullPolicy }}
          env:
            - name: DONT_PROMPT_WSL_INSTALL
              value: true
          command: ["rsync","-avh"]
          args: [
              "/home/codium/","/mnt/{{ .Release.Name }}-codium-codium/",
            ]
          volumeMounts:
            - name: {{ .Release.Name }}-codium-codium
              mountPath: /mnt/{{ .Release.Name }}-codium-codium
        - name: directories
          {{ include "container.securityContext" . | indent 10 }}
          image: ghcr.io/alexstorm1313/codium:latest
          imagePullPolicy: {{ .Values.deployments.containers.pullPolicy }}
          env:
            - name: DONT_PROMPT_WSL_INSTALL
              value: true
          command: ["mkdir","-p"]
          args: [
              "/mnt/{{ .Release.Name }}-codium-codium/.ssh",
              "/mnt/{{ .Release.Name }}-codium-codium/.cline/data",
              "/mnt/{{ .Release.Name }}-codium-codium/.continue",
            ]
          volumeMounts:
            - name: {{ .Release.Name }}-codium-codium
              mountPath: /mnt/{{ .Release.Name }}-codium-codium
        - name: extensions
          {{ include "container.securityContext" . | indent 10 }}
          image: ghcr.io/alexstorm1313/codium:latest
          imagePullPolicy: {{ .Values.deployments.containers.pullPolicy }}
          env:
            - name: DONT_PROMPT_WSL_INSTALL
              value: true
          command: ["codium","--user-data-dir","/mnt/{{ .Release.Name }}-codium-codium/.vscodium-server/data","--extensions-dir","/mnt/{{ .Release.Name }}-codium-codium/.vscodium-server/extensions"]
          args: [
              "--install-extension","DEVSENSE.phptools-vscode",
            ]
          volumeMounts:
            - name: {{ .Release.Name }}-codium-codium
              mountPath: /mnt/{{ .Release.Name }}-codium-codium
      containers:
        - name: codium
          {{ include "container.securityContext" . | indent 10 }}
          image: ghcr.io/alexstorm1313/codium:latest
          imagePullPolicy: {{ .Values.deployments.containers.pullPolicy }}
          env:
            - name: DONT_PROMPT_WSL_INSTALL
              value: true
          volumeMounts:
            - name: {{ .Release.Name }}-codium-codium
              mountPath: /home/codium

            {{ range .Values.deployments.volumes }}
            - name: {{ . }}
              mountPath: /home/codium/workspace/{{ . }}
            {{ end }}

            - name: {{ .Release.Name }}-codium-secrets
              mountPath: /home/codium/.ssh/id_privatekey
              subPath: ssh
              readOnly: true
            - name: {{ .Release.Name }}-codium-secrets
              mountPath: /home/codium/.wakatime.cfg
              subPath: wakatime
              readOnly: true
            # # - name: {{ .Release.Name }}-codium-secrets
            # #   mountPath: /home/codium/.kube/config
            # #   subPath: kube
            # #   readOnly: true

            - name: {{ .Release.Name }}-codium-configmaps
              mountPath: /home/codium/.cline/data/globalState.json
              subPath: cline
              readOnly: true
            - name: {{ .Release.Name }}-codium-configmaps
              mountPath: /home/codium/.continue/config.yaml
              subPath: continue
              readOnly: true
      
            - name: {{ .Release.Name }}-codium-configmaps
              mountPath: /home/codium/.gitconfig
              subPath: git
              readOnly: true
            - name: {{ .Release.Name }}-codium-configmaps
              mountPath: /home/codium/.vscodium-server/data/Machine/settings.json
              subPath: codium
              readOnly: true
            
            # - name: {{ .Release.Name }}-codium-configmaps
            #   mountPath: /home/codium/.aws/config
            #   subPath: aws
            #   readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
      volumes:
        - name: {{ .Release.Name }}-codium-secrets
          secret:
            secretName: {{ .Release.Name }}-codium
            optional: true
        - name: {{ .Release.Name }}-codium-configmaps
          configMap:
            name: {{ .Release.Name }}-codium
            optional: true

        - name: {{ .Release.Name }}-codium-codium
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-codium-codium

        {{ range .Values.deployments.volumes }}
        - name: {{ . }}
          persistentVolumeClaim:
            claimName: {{ . }}
        {{ end }}
{{ end }}