{{ if has "codium" .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-codium
  labels:
    app: {{ .Release.Name }}-codium
spec:
  {{ if .Values.devmode }}
  strategy:
    type: Recreate
  {{ end }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-codium
  template:
    metadata:
      annotations:
      labels:
        app: {{ .Release.Name }}-codium
        deployment: {{ .Release.Name }}-codium
    spec:
      {{ include "pod.securityContext" . | indent 6 }}
      containers:
        - name: codium
          image: localhost/codium:latest
          imagePullPolicy: {{ .Values.deployments.containers.pullPolicy }}                     
          volumeMounts:
            # - name: {{ .Release.Name }}-codium-codium
            #   mountPath: /home/codium
            # - name: {{ .Release.Name }}-codium-codium
            #   mountPath: /home/codium/.cache
            #   subPath: .cache
            # - name: {{ .Release.Name }}-codium-codium
            #   mountPath: /home/codium/.ssh
            #   subPath: .ssh
            # - name: {{ .Release.Name }}-codium-codium
            #   mountPath: /home/codium/.wakatime
            #   subPath: .wakatime
            # - name: {{ .Release.Name }}-codium-codium
            #   mountPath: /home/codium/.continue
            #   subPath: .continue

            # {{ range .Values.deployments.volumes }}
            # - name: {{ . }}
            #   mountPath: /home/codium/workspace/{{ . }}
            # {{ end }}

            # - name: {{ .Release.Name }}-codium-secrets
            #   mountPath: /home/codium/.ssh/privatekey
            #   subPath: ssh
            #   readOnly: true
            # # - name: {{ .Release.Name }}-codium-secrets
            # #   mountPath: /home/codium/.kube/config
            # #   subPath: kube
            # #   readOnly: true

            # - name: {{ .Release.Name }}-codium-configmaps
            #   mountPath: /home/codium/.continue/config.yaml
            #   subPath: continue
            #   readOnly: true
            # - name: {{ .Release.Name }}-codium-configmaps
            #   mountPath: /home/codium/.gitconfig
            #   subPath: git
            #   readOnly: true
            - name: {{ .Release.Name }}-codium-configmaps
              mountPath: /home/codium/.vscodium-server/data/Machine/settings.json
              subPath: codium
              readOnly: true
            # - name: {{ .Release.Name }}-codium-configmaps
            #   mountPath: /home/codium/.aws/config
            #   subPath: awz
            #   readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
      volumes:
        - name: {{ .Release.Name }}-codium-secrets
          secret:
            secretName: {{ .Release.Name }}-codium
            optional: true
        - name: {{ .Release.Name }}-codium-configmaps
          configMap:
            name: {{ .Release.Name }}-codium
            optional: true

        - name: {{ .Release.Name }}-codium-codium
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-codium-codium
        
        {{ range .Values.deployments.volumes }}
        - name: {{ . }}
          persistentVolumeClaim:
            claimName: {{ . }}
        {{ end }}
{{ end }}