apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Release.Namespace }}-{{ .Release.Name }}-dbgate-dbgate
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete ## MAybe delete bacuse container populates each time
  storageClassName: local-storage
  claimRef:
    name: {{ .Release.Name }}-dbgate-dbgate
    namespace: {{ .Release.Namespace }}
  local:
    path: /tmp
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - sno