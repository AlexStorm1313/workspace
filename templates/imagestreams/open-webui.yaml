kind: ImageStream
apiVersion: image.openshift.io/v1
metadata:
  name: open-webui
  annotations:
    app.kubernetes.io/managed-by: "Helm"
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  lookupPolicy:
    local: false
  tags:
  - name: main
    from:
        kind: DockerImage
        name: 'ghcr.io/open-webui/open-webui:main'
    importPolicy:
      scheduled: true
    referencePolicy:
      type: Source