kind: ImageStream
apiVersion: image.openshift.io/v1
metadata:
  name: codium
  annotations:
    app.kubernetes.io/managed-by: "Helm"
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  lookupPolicy:
    local: false
  tags:
  - name: latest
    from:
        kind: DockerImage
        name: 'ghcr.io/alexstorm1313/codium:latest'
    importPolicy:
      scheduled: true
    referencePolicy:
      type: Source