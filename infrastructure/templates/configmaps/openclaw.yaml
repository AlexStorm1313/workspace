{{ if .Values.services.openclaw.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-openclaw
data:
  openclaw.json: |
{{ .Files.Get "configs/openclaw/openclaw.json" | nindent 4 }}
  default.conf: |
      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }

      server {
        listen 8080;
        server_name openclaw.workspace.localhost;

        location / {
          proxy_pass http://127.0.0.1:18789;
          proxy_http_version 1.1;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
        }
      }
      server {
        listen 8080;
        server_name codex.openclaw.workspace.localhost;

        location / {
          proxy_pass http://127.0.0.1:1455;
          proxy_http_version 1.1;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
        }
      }
{{ end }}
