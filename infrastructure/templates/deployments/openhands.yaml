{{ if .Values.services.openhands.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-openhands
  labels:
    app: {{ .Release.Name }}-openhands
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-openhands
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-openhands
    spec:
      {{ include "pod.securityContext" . | indent 6 }}
      initContainers:
        - name: mkdir
          {{ include "container.securityContext" . | indent 10 }}
          image: docker.io/busybox:latest
          command: ["/bin/mkdir"]
          args: ["-p",
            "/mnt/{{ .Release.Name }}-openhands-openhands/.local",
            "/mnt/{{ .Release.Name }}-openhands-openhands/.cache",
            "/mnt/{{ .Release.Name }}-openhands-openhands/.config",
          ]
          volumeMounts:
            - name: {{ .Release.Name }}-openhands-openhands
              mountPath: /mnt/{{ .Release.Name }}-openhands-openhands
      containers:
        - name: server
          {{ include "container.securityContext" . | indent 10 }}
          image: {{ .Values.services.openhands.image }}
          imagePullPolicy: {{ .Values.deployments.containers.pullPolicy }}
          command: ["tini", "--"]
          args: ["bunx", "agent-canvas", "--port", "3000"]
          env:
            - name: CONTAINER_HOST
              value: tcp://host.containers.internal:2375
          volumeMounts:
            - name: {{ .Release.Name }}-openhands-openhands
              mountPath: /home/core/.local
              subPath: .local
            - name: {{ .Release.Name }}-openhands-openhands
              mountPath: /home/core/.cache
              subPath: .cache
            - name: {{ .Release.Name }}-openhands-openhands
              mountPath: /home/core/.config
              subPath: .config

            {{ range .Values.deployments.volumes }}
            - name: {{ . }}
              mountPath: /home/core/workspace/{{ . }}
            {{ end }}

            - name: {{ .Release.Name }}-openhands-configmaps
              mountPath: /home/core/.config/opencode/opencode.json
              subPath: opencode.json

            - name: {{ .Release.Name }}-openhands-secrets
              mountPath: /home/core/.codex/auth.json
              subPath: auth.json

      volumes:
        - name: {{ .Release.Name }}-openhands-secrets
          secret:
            secretName: {{ .Release.Name }}-openhands
            optional: true
        - name: {{ .Release.Name }}-openhands-configmaps
          configMap:
            name: {{ .Release.Name }}-openhands
            optional: true

        - name: {{ .Release.Name }}-openhands-openhands
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-openhands-openhands

        {{ range .Values.deployments.volumes }}
        - name: {{ . }}
          persistentVolumeClaim:
            claimName: {{ . }}
        {{ end }}

        - name: development
          hostPath:
            path: /home/alexstorm13/Development
            type: Directory
{{ end }}
