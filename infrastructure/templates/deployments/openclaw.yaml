{{- if has "openclaw" .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-openclaw
  labels:
    app: {{ .Release.Name }}-openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-openclaw
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-openclaw
    spec:
      initContainers:
        - name: config
          {{ include "container.securityContext" . | indent 10 }}      
          image: docker.io/busybox:latest
          command: ["cp"]
          args: [
            "-f",
            "/mnt/{{ .Release.Name }}-openclaw-configmaps/openclaw.json",
            "/mnt/{{ .Release.Name }}-openclaw-openclaw/openclaw.json",
          ]
          volumeMounts:
            - name: {{ .Release.Name }}-openclaw-openclaw
              mountPath: /mnt/{{ .Release.Name }}-openclaw-openclaw
            - name: {{ .Release.Name }}-openclaw-configmaps
              mountPath: /mnt/{{ .Release.Name }}-openclaw-configmaps/openclaw.json
              subPath: openclaw.json
              readOnly: false
      containers:
        - name: gateway
          {{ include "container.securityContext" . | indent 10 }}
          image: localhost/core:latest
          imagePullPolicy: {{ .Values.deployments.containers.pullPolicy }}
          command: ["openclaw"]
          args: ["gateway", "run"]
          env:
            - name: OPENCLAW_GATEWAY_TOKEN
              value: 123
            - name: OPENCLAW_ALLOW_INSECURE_PRIVATE_WS
              value: 1
          volumeMounts:
            - name: {{ .Release.Name }}-openclaw-openclaw
              mountPath: /home/core/.openclaw
            # - name: {{ .Release.Name }}-openclaw-configmaps
            #   mountPath: /home/core/.openclaw/openclaw.json
            #   subPath: openclaw.json
        - name: nginx
            #   readOnly: false
          image: docker.io/nginx:latest
          imagePullPolicy: {{ .Values.deployments.containers.pullPolicy }}
          ports:
            - containerPort: 8080
              hostPort: 18789
          volumeMounts:
            - name: {{ .Release.Name }}-openclaw-configmaps
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
        - name: opencode-node
          image: localhost/core:latest
          imagePullPolicy: {{ .Values.deployments.containers.pullPolicy }}
          command: ["openclaw"]
          args:
            - "node"
            - "run"
            # - "--host"
            # - "ws://127.0.0.1:18789"
            - --node-id
            - "opencode-node"
            - "--display-name"
            - "opencode-node"
          env:
            - name: OPENCLAW_GATEWAY_TOKEN
              value: 123
            - name: OPENCLAW_ALLOW_INSECURE_PRIVATE_WS
              value: 1
      volumes:
        - name: {{ .Release.Name }}-openclaw-openclaw
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-openclaw-openclaw

        - name: {{ .Release.Name }}-openclaw-configmaps
          configMap:
            name: {{ .Release.Name }}-openclaw
            optional: true
        - name: {{ .Release.Name }}-openclaw-secrets
          secret:
            secretName: {{ .Release.Name }}-openclaw
            optional: true
        
     
{{- end }}