{{ if has "codium" .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-codium
  labels:
    app: {{ .Release.Name }}-codium
spec:
  {{ if .Values.devmode }}
  strategy:
    type: Recreate
  {{ end }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-codium
  template:
    metadata:
      annotations:
      labels:
        app: {{ .Release.Name }}-codium
        deployment: {{ .Release.Name }}-codium
    spec:
      {{ include "pod.securityContext" . | indent 6 }}
      initContainers:
        - name: volume
          {{ include "container.securityContext" . | indent 10 }}
          image: docker.io/busybox:latest
          command: ["/bin/mkdir"]
          args: ["-p",
            "/mnt/{{ .Release.Name }}-codium-codium/.vscode-oss",
            "/mnt/{{ .Release.Name }}-codium-codium/.vscodium-server/data",
            "/mnt/{{ .Release.Name }}-codium-codium/.vscodium-server/data/Machine",
            "/mnt/{{ .Release.Name }}-codium-codium/.local",
            "/mnt/{{ .Release.Name }}-codium-codium/.cache",
            "/mnt/{{ .Release.Name }}-codium-codium/.ssh",
          ]
          volumeMounts:
            - name: {{ .Release.Name }}-codium-codium
              mountPath: /mnt/{{ .Release.Name }}-codium-codium
      containers:
        - name: server
          {{ include "container.securityContext" . | indent 10 }}
          image: localhost/core:latest
          imagePullPolicy: {{ .Values.deployments.containers.pullPolicy }}
          command: ["tini", "--"]
          args: ["codium", "serve-web", "--host", "0.0.0.0", "--port", "3000", "--without-connection-token"]
          env:
            - name: DONT_PROMPT_WSL_INSTALL
              value: true
            - name: CONTAINER_HOST
              value: tcp://host.containers.internal:2375
          volumeMounts:
            - name: {{ .Release.Name }}-codium-codium
              mountPath: /home/core/.vscode-oss
              subPath: .vscode-oss
            - name: {{ .Release.Name }}-codium-codium
              mountPath: /home/core/.vscodium-server/data
              subPath: .vscodium-server/data
            - name: {{ .Release.Name }}-codium-codium
              mountPath: /home/core/.local
              subPath: .local
            - name: {{ .Release.Name }}-codium-codium
              mountPath: /home/core/.cache
              subPath: .cache
            - name: {{ .Release.Name }}-codium-codium
              mountPath: /home/core/.ssh
              subPath: .ssh

            {{ range .Values.deployments.volumes }}
            - name: {{ . }}
              mountPath: /home/core/workspace/{{ . }}
            {{ end }}

            - name: {{ .Release.Name }}-codium-configmaps
              mountPath: /home/core/.gitconfig
              subPath: .gitconfig
              readOnly: true
            - name: {{ .Release.Name }}-codium-configmaps
              mountPath: /home/core/.vscodium-server/data/Machine/settings.json
              subPath: settings.json
              readOnly: true
            # - name: {{ .Release.Name }}-codium-configmaps
            #   mountPath: /home/core/.aws/config
            #   subPath: aws
            #   readOnly: true

            - name: {{ .Release.Name }}-codium-secrets
              mountPath: /home/core/.ssh/id_privatekey
              subPath: id_privatekey
              readOnly: true
            - name: {{ .Release.Name }}-codium-secrets
              mountPath: /home/core/.wakatime.cfg
              subPath: wakatime.cfg
              readOnly: true
            - name: {{ .Release.Name }}-codium-secrets
              mountPath: /home/core/.codex/auth.json
              subPath: auth.json

          livenessProbe:
            httpGet:
              path: /
              port: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
      volumes:
        - name: {{ .Release.Name }}-codium-secrets
          secret:
            secretName: {{ .Release.Name }}-codium
            optional: true
        - name: {{ .Release.Name }}-codium-configmaps
          configMap:
            name: {{ .Release.Name }}-codium
            optional: true

        - name: {{ .Release.Name }}-codium-codium
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-codium-codium

        {{ range .Values.deployments.volumes }}
        - name: {{ . }}
          persistentVolumeClaim:
            claimName: {{ . }}
        {{ end }}
{{ end }}