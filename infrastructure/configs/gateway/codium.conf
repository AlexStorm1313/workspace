server {
    include /etc/nginx/includes/listen.conf;

    server_name codium.workspace.localhost codium.workspace.fedora-workstation;
    
    include /etc/nginx/includes/ssl.conf;

    location / {
        include /etc/nginx/includes/proxy.conf;

        resolver ${NGINX_LOCAL_RESOLVERS} valid=5s ipv6=off;
        resolver_timeout 2s;

        set $codium workspace-codium-pod:3000;
        proxy_pass http://$codium;
    }
}
