server {
    include /etc/nginx/includes/listen.conf;

    server_name openhands.workspace.localhost openhands.workspace.fedora-workstation openhands.workspace.alexbrasser.com;

    include /etc/nginx/includes/ssl.conf;

    location / {
        include /etc/nginx/includes/proxy.conf;

        resolver ${NGINX_LOCAL_RESOLVERS} valid=5s ipv6=off;
        resolver_timeout 2s;

        set $upstream workspace-openhands-pod:3000;
        proxy_pass http://$upstream;
    }
}
